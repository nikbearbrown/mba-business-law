<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-7-1 desc-7-1">
<title id="title-7-1">diagram showing the five elements of a valid contract</title>
<desc id="desc-7-1">A diagram showing the five elements of a valid contract — offer, acceptance, consideration, capacity, legality — arranged as a pentagon with the contract at the center. Each element labeled with its operational meaning. The student should notice that all five elements must be satisfied for a contract to be enforceable.</desc>
